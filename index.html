<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Generator — By Vyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="/style/stylesheet.css">
</head>
<body>

    <!-- ══════════════════════════════════════
        LOADING SCREEN
    ══════════════════════════════════════════ -->
    <div id="loading-screen">
        <div class="welcome-wrap">
            <div class="welcome-title">
                Web Design ATM Generator
                <span>By Vyy</span>
            </div>
        </div>
        <div class="loader">
            <div class="text"><span>Loading</span></div>
            <div class="text"><span>Loading</span></div>
            <div class="text"><span>Loading</span></div>
            <div class="text"><span>Loading</span></div>
            <div class="text"><span>Loading</span></div>
            <div class="text"><span>Loading</span></div>
            <div class="text"><span>Loading</span></div>
            <div class="text"><span>Loading</span></div>
            <div class="text"><span>Loading</span></div>
            <div class="line"></div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
        MAIN PAGE
    ══════════════════════════════════════════ -->
    <div id="main-page">

        <!-- Header -->
        <header class="site-header">
            <h1><strong>ATM</strong> Card Generator &nbsp;·&nbsp; By Vyy</h1>
        </header>

        <!-- Card Preview -->
        <div class="card-preview-section">
            <div class="atm-card" id="atm-card">
                <div class="card-gradient" id="card-gradient"></div>
                <div class="card-noise"></div>
                <div class="card-shine"></div>
                <div class="card-content">

                    <!-- Top Row: Chip + Brand + Contactless -->
                    <div class="card-top">
                        <div class="chip-offset">
                            <svg class="chip-wrap" viewBox="0 0 42 33" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%"   stop-color="#e8cc8a"/>
                                        <stop offset="45%"  stop-color="#b8922e"/>
                                        <stop offset="100%" stop-color="#d4a84b"/>
                                    </linearGradient>
                                    <linearGradient id="cp" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%"   stop-color="#dfc070"/>
                                        <stop offset="100%" stop-color="#a07828"/>
                                    </linearGradient>
                                </defs>
                                <!-- Base plate -->
                                <rect x="0"  y="0"  width="42" height="33" rx="5" fill="url(#cg)"/>
                                <!-- Circuit legs -->
                                <rect x="14" y="0"  width="2"  height="8"  fill="#9a7520" opacity=".65"/>
                                <rect x="26" y="0"  width="2"  height="8"  fill="#9a7520" opacity=".65"/>
                                <rect x="14" y="25" width="2"  height="8"  fill="#9a7520" opacity=".65"/>
                                <rect x="26" y="25" width="2"  height="8"  fill="#9a7520" opacity=".65"/>
                                <rect x="0"  y="11" width="8"  height="2"  fill="#9a7520" opacity=".65"/>
                                <rect x="0"  y="20" width="8"  height="2"  fill="#9a7520" opacity=".65"/>
                                <rect x="34" y="11" width="8"  height="2"  fill="#9a7520" opacity=".65"/>
                                <rect x="34" y="20" width="8"  height="2"  fill="#9a7520" opacity=".65"/>
                                <!-- Center panel -->
                                <rect x="8"  y="7"  width="26" height="19" rx="2"   fill="#b8922e"/>
                                <rect x="9"  y="8"  width="24" height="17" rx="1.5" fill="url(#cp)"/>
                                <!-- Grid lines -->
                                <line x1="21" y1="8"    x2="21" y2="25"   stroke="#9a7520" stroke-width="1" opacity=".5"/>
                                <line x1="9"  y1="16.5" x2="33" y2="16.5" stroke="#9a7520" stroke-width="1" opacity=".5"/>
                                <!-- Corner accents -->
                                <rect x="9"  y="8"  width="5" height="5" fill="#c8a030" opacity=".4"/>
                                <rect x="28" y="20" width="5" height="5" fill="#c8a030" opacity=".4"/>
                            </svg>
                        </div>

                        <div class="card-top-right">
                            <span class="card-brand" id="card-brand">MASTERCARD</span>
                            <!-- Contactless signal — rotated 90deg (facing right) -->
                            <svg class="contactless-wrap" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" fill="none">
                                <circle cx="11" cy="14.5" r="1.4" fill="white"/>
                                <path d="M7.5 11.5 a5 5 0 0 1 7 0"       stroke="white" stroke-width="1.7" stroke-linecap="round" opacity=".5"/>
                                <path d="M4.8  8.8  a9 9 0 0 1 12.4 0"   stroke="white" stroke-width="1.7" stroke-linecap="round" opacity=".7"/>
                                <path d="M2.1  6.1  a13 13 0 0 1 17.8 0" stroke="white" stroke-width="1.7" stroke-linecap="round" opacity=".9"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Mid Row: Card Number -->
                    <div class="card-mid">
                        <div class="card-number-display" id="card-number-display">9759 2484 5269 6576</div>
                    </div>

                    <!-- Bottom Row: Name, Expiry, Logo -->
                    <div class="card-bottom">
                        <div class="card-bottom-left">
                            <div class="card-holder-block">
                                <span class="card-label">Card Holder</span>
                                <span class="card-value" id="card-name-display">BRUCE WAYNE</span>
                            </div>
                            <div class="card-expiry-block">
                                <span class="card-label">Valid Thru</span>
                                <span class="card-value" id="card-expiry-display">12/24</span>
                            </div>
                        </div>

                        <!-- Logo area — toggled by JS -->
                        <div id="card-logo-area">
                            <!-- Mastercard (default) -->
                            <div class="mc-logo" id="mc-logo-el">
                                <div class="circle"></div>
                                <div class="circle"></div>
                            </div>
                            <!-- VISA — Font Awesome Free v7.2.0 -->
                            <svg id="visa-logo-el" class="visa-logo-el" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg" fill="white">
                                <path d="M502.1 295.3C502.1 295.3 509.7 332.5 511.4 340.3L478 340.3C481.3 331.4 494 296.8 494 296.8C493.8 297.1 497.3 287.7 499.3 281.9L502.1 295.3zM608 144L608 496C608 522.5 586.5 544 560 544L80 544C53.5 544 32 522.5 32 496L32 144C32 117.5 53.5 96 80 96L560 96C586.5 96 608 117.5 608 144zM184.5 395.2L247.7 240L205.2 240L165.9 346L161.6 324.5L147.6 253.1C145.3 243.2 138.2 240.4 129.4 240L64.7 240L64 243.1C79.8 247.1 93.9 252.9 106.2 260.2L142 395.2L184.5 395.2zM278.9 395.4L304.1 240L263.9 240L238.8 395.4L278.9 395.4zM418.8 344.6C419 326.9 408.2 313.4 385.1 302.3C371 295.2 362.4 290.4 362.4 283.1C362.6 276.5 369.7 269.7 385.5 269.7C398.6 269.4 408.2 272.5 415.4 275.6L419 277.3L424.5 243.7C416.6 240.6 404 237.1 388.5 237.1C348.8 237.1 320.9 258.3 320.7 288.5C320.4 310.8 340.7 323.2 355.9 330.7C371.4 338.3 376.7 343.3 376.7 350C376.5 360.4 364.1 365.2 352.6 365.2C336.6 365.2 328 362.7 314.9 356.9L309.6 354.4L304 389.3C313.4 393.6 330.8 397.4 348.8 397.6C391 397.7 418.5 376.8 418.8 344.6zM560 395.4L527.6 240L496.5 240C486.9 240 479.6 242.8 475.5 252.9L415.8 395.4L458 395.4C458 395.4 464.9 376.2 466.4 372.1L518 372.1C519.2 377.6 522.8 395.4 522.8 395.4L560 395.4z"/>
                            </svg>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Theme Selector -->
        <div class="themes-section">
            <p class="section-label">Choose Theme</p>
            <div class="theme-grid" id="theme-grid"></div>
        </div>

        <!-- Editor -->
        <div class="editor-section">
            <p class="section-label">Edit Card</p>
            <div class="editor-grid">

                <div class="field-group field-full">
                    <label for="inp-number">Card Number</label>
                    <input id="inp-number" type="text" maxlength="19"
                            placeholder="XXXX XXXX XXXX XXXX" value="9759 2484 5269 6576">
                    <span class="helper-text">16 digits · auto-spaced</span>
                </div>

                <div class="field-group field-full">
                    <label for="inp-name">Card Holder Name</label>
                    <input id="inp-name" type="text" maxlength="26"
                            placeholder="YOUR NAME" value="BRUCE WAYNE">
                </div>

                <div class="field-group">
                    <label for="inp-expiry">Expiry Date</label>
                    <input id="inp-expiry" type="text" maxlength="5"
                            placeholder="MM/YY" value="12/24">
                </div>

                <div class="field-group">
                    <label for="inp-brand">Brand Name</label>
                    <input id="inp-brand" type="text" maxlength="16"
                            placeholder="MASTERCARD" value="MASTERCARD">
                </div>

                <div class="field-group field-full">
                    <label>Card Logo</label>
                    <div class="logo-selector">
                        <button class="logo-btn active" id="btn-mc"   onclick="setLogo('mc')">Mastercard</button>
                        <button class="logo-btn"        id="btn-visa" onclick="setLogo('visa')">VISA</button>
                    </div>
                </div>

                <!-- Download -->
                <div class="field-group field-full download-wrap">
                    <button class="download-btn" id="download-btn" onclick="downloadCard()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download Card Image
                    </button>
                    <span class="helper-text-center">Tersimpan sebagai PNG · 2x resolution</span>
                </div>

            </div>
        </div>

    </div>

    <script src="/style/script.js"></script>
</body>
</html>

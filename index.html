<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Generator — By Vyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="/style/stylesheet.css">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
    <div class="welcome-wrap">
        <div class="welcome-title">
            Web Design ATM Generator
            <span>By Vyy</span>
        </div>
    </div>
    <div class="loader">
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="line"></div>
    </div>
</div>

<!-- MAIN PAGE -->
<div id="main-page">
    <header class="site-header">
        <h1><strong>ATM</strong> Card Generator &nbsp;·&nbsp; By Vyy</h1>
    </header>

    <div class="card-preview-section">
        <div class="atm-card" id="atm-card">
            <div class="card-gradient" id="card-gradient"></div>
            <div class="card-noise"></div>
            <div class="card-shine"></div>
            <div class="card-content">

                <div class="card-top">
                    <!-- chip spacer: geser kanan+bawah dikit -->
                    <div style="margin-top:10px; margin-left:8px;">
                        <svg class="chip-wrap" viewBox="0 0 42 33" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%"   stop-color="#e8cc8a"/>
                                    <stop offset="45%"  stop-color="#b8922e"/>
                                    <stop offset="100%" stop-color="#d4a84b"/>
                                </linearGradient>
                                <linearGradient id="cp" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%"   stop-color="#dfc070"/>
                                    <stop offset="100%" stop-color="#a07828"/>
                                </linearGradient>
                            </defs>
                            <rect x="0" y="0" width="42" height="33" rx="5" fill="url(#cg)"/>
                            <rect x="14" y="0"  width="2" height="8"  fill="#9a7520" opacity=".65"/>
                            <rect x="26" y="0"  width="2" height="8"  fill="#9a7520" opacity=".65"/>
                            <rect x="14" y="25" width="2" height="8"  fill="#9a7520" opacity=".65"/>
                            <rect x="26" y="25" width="2" height="8"  fill="#9a7520" opacity=".65"/>
                            <rect x="0"  y="11" width="8" height="2"  fill="#9a7520" opacity=".65"/>
                            <rect x="0"  y="20" width="8" height="2"  fill="#9a7520" opacity=".65"/>
                            <rect x="34" y="11" width="8" height="2"  fill="#9a7520" opacity=".65"/>
                            <rect x="34" y="20" width="8" height="2"  fill="#9a7520" opacity=".65"/>
                            <rect x="8" y="7" width="26" height="19" rx="2" fill="#b8922e"/>
                            <rect x="9" y="8" width="24" height="17" rx="1.5" fill="url(#cp)"/>
                            <line x1="21" y1="8"  x2="21" y2="25" stroke="#9a7520" stroke-width="1" opacity=".5"/>
                            <line x1="9"  y1="16.5" x2="33" y2="16.5" stroke="#9a7520" stroke-width="1" opacity=".5"/>
                            <rect x="9"  y="8"  width="5" height="5" fill="#c8a030" opacity=".4"/>
                            <rect x="28" y="20" width="5" height="5" fill="#c8a030" opacity=".4"/>
                        </svg>
                    </div>

                    <div class="card-top-right">
                        <span class="card-brand" id="card-brand">MASTERCARD</span>
                        <!-- Contactless: rotate 90deg → menghadap ke kanan -->
                        <svg class="contactless-wrap" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" fill="none" style="transform: rotate(90deg);">
                            <circle cx="11" cy="14.5" r="1.4" fill="white"/>
                            <path d="M7.5 11.5 a5 5 0 0 1 7 0"        stroke="white" stroke-width="1.7" stroke-linecap="round" opacity=".5"/>
                            <path d="M4.8  8.8  a9 9 0 0 1 12.4 0"    stroke="white" stroke-width="1.7" stroke-linecap="round" opacity=".7"/>
                            <path d="M2.1  6.1  a13 13 0 0 1 17.8 0"  stroke="white" stroke-width="1.7" stroke-linecap="round" opacity=".9"/>
                        </svg>
                    </div>
                </div>

                <div class="card-mid">
                    <div class="card-number-display" id="card-number-display">9759 2484 5269 6576</div>
                </div>

                <div class="card-bottom">
                    <div style="display:flex;gap:18px;align-items:flex-end;">
                        <div class="card-holder-block">
                            <span class="card-label">Card Holder</span>
                            <span class="card-value" id="card-name-display">BRUCE WAYNE</span>
                        </div>
                        <div class="card-expiry-block">
                            <span class="card-label">Valid Thru</span>
                            <span class="card-value" id="card-expiry-display">12/24</span>
                        </div>
                    </div>
                    <!-- Logo area — toggled by JS -->
                    <div id="card-logo-area">
                        <!-- Mastercard circles (default) -->
                        <div class="mc-logo" id="mc-logo-el">
                            <div class="circle"></div>
                            <div class="circle"></div>
                        </div>
                        <!-- VISA text logo -->
                        <svg id="visa-logo-el" style="display:none;height:24px;width:auto;" viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg">
                            <text x="0" y="17" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="20" font-style="italic" fill="white" letter-spacing="1">VISA</text>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Selector -->
    <div class="themes-section">
        <p class="section-label">Choose Theme</p>
        <div class="theme-grid" id="theme-grid"></div>
    </div>

    <!-- Editor -->
    <div class="editor-section">
        <p class="section-label">Edit Card</p>
        <div class="editor-grid">
            <div class="field-group field-full">
                <label for="inp-number">Card Number</label>
                <input id="inp-number" type="text" maxlength="19" placeholder="XXXX XXXX XXXX XXXX" value="9759 2484 5269 6576">
                <span class="helper-text">16 digits · auto-spaced</span>
            </div>
            <div class="field-group field-full">
                <label for="inp-name">Card Holder Name</label>
                <input id="inp-name" type="text" maxlength="26" placeholder="YOUR NAME" value="BRUCE WAYNE">
            </div>
            <div class="field-group">
                <label for="inp-expiry">Expiry Date</label>
                <input id="inp-expiry" type="text" maxlength="5" placeholder="MM/YY" value="12/24">
            </div>
            <div class="field-group">
                <label for="inp-brand">Brand Name</label>
                <input id="inp-brand" type="text" maxlength="16" placeholder="MASTERCARD" value="MASTERCARD">
            </div>
            <div class="field-group field-full">
                <label>Card Logo</label>
                <div class="logo-selector">
                    <button class="logo-btn active" id="btn-mc" onclick="setLogo('mc')">Mastercard</button>
                    <button class="logo-btn" id="btn-visa" onclick="setLogo('visa')">VISA</button>
                </div>
            </div>

            <!-- Download button -->
            <div class="field-group field-full" style="margin-top:8px;">
                <button id="download-btn" onclick="downloadCard()" style="
                    width:100%; padding:14px;
                    background: linear-gradient(135deg,#2a2a2a,#1a1a1a);
                    border: 1px solid #444; border-radius: 10px;
                    color:#fff; font-family:'Space Mono',monospace;
                    font-size:.72rem; letter-spacing:.22em; text-transform:uppercase;
                    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
                    transition: background .2s, border-color .2s, transform .15s;
                " onmouseover="this.style.borderColor='#888';this.style.background='linear-gradient(135deg,#333,#222)'"
                    onmouseout="this.style.borderColor='#444';this.style.background='linear-gradient(135deg,#2a2a2a,#1a1a1a)'"
                    onmousedown="this.style.transform='scale(0.97)'"
                    onmouseup="this.style.transform='scale(1)'">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download Card Image
                </button>
                <span class="helper-text" style="text-align:center;">Tersimpan sebagai PNG · 800×500px</span>
            </div>
        </div>
    </div>
</div>

<script src="/style/script.js"></script>

</body>
</html>
